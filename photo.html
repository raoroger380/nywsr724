<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>拍照留念 · 农友维生日</title>
    <style>
        :root {
            --bg: #ece6e0;
            --glass: rgba(255, 255, 255, 0.58);
            --border: rgba(59, 130, 246, 0.14);
            --accent: #3b82f6;
            --text: #1e293b;
            --muted: #64748b;
            --radius: 16px;
            --radius-lg: 24px;
        }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; margin: 0; }
        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse at 50% 20%, rgba(59, 130, 246, 0.05), transparent 58%),
                var(--bg);
        }
        .page {
            min-height: 100vh;
            padding: 28px 18px 34px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .photo-header { text-align: center; }
        .photo-header h1 {
            margin: 0 0 6px;
            color: var(--accent);
            font-weight: 400;
            letter-spacing: 2px;
            font-size: clamp(1.6rem, 5vw, 2.3rem);
        }
        .photo-header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.7;
        }
        .photo-layout {
            width: min(980px, 100%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(220px, 0.75fr) minmax(280px, 1.25fr);
            gap: 16px;
            align-items: stretch;
        }
        .photo-timeline, .photo-camera {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.08);
        }
        .photo-timeline {
            padding: 18px 16px;
            min-height: 430px;
        }
        .tl-heading {
            color: var(--accent);
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }
        .tl-items { display: grid; gap: 10px; }
        .tl-item {
            display: grid;
            grid-template-columns: 10px 1fr;
            gap: 10px;
            align-items: start;
            padding: 10px;
            border: 1px solid rgba(59, 130, 246, 0.08);
            border-radius: 12px;
            background: rgba(255,255,255,0.38);
            cursor: pointer;
        }
        .tl-item.active { border-color: rgba(59, 130, 246, 0.35); background: rgba(59,130,246,0.07); }
        .tl-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-top: 5px;
            opacity: 0.7;
        }
        .tl-title { font-size: 0.86rem; line-height: 1.45; }
        .tl-time { margin-top: 3px; font-size: 0.7rem; color: var(--muted); opacity: 0.7; }
        .tl-empty { color: var(--muted); text-align: center; padding: 36px 12px; font-size: 0.86rem; }
        .photo-camera {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .camera-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: var(--radius);
            overflow: hidden;
            background: rgba(0,0,0,0.06);
            border: 1px solid rgba(59, 130, 246, 0.08);
        }
        video, canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        video { transform: scaleX(-1); }
        #photoCanvas, #photoPreviewCanvas { display: none; }
        .photo-preview-area.show #photoPreviewCanvas { display: block; }
        .photo-note input {
            width: 100%;
            border: 1px solid rgba(59,130,246,0.15);
            background: rgba(255,255,255,0.62);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font: inherit;
            outline: none;
        }
        .photo-note input:focus { border-color: var(--accent); }
        .photo-actions, .photo-bottom-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .photo-btn, .link-btn {
            border: 1px solid rgba(59,130,246,0.18);
            border-radius: 999px;
            padding: 11px 22px;
            font: inherit;
            color: var(--accent);
            background: rgba(59,130,246,0.06);
            cursor: pointer;
        }
        .photo-btn-primary, .photo-btn-success {
            color: #fff;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #2563eb);
        }
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 12px 22px;
            border-radius: 12px;
            background: rgba(0,0,0,0.72);
            color: #fff;
            font-size: 0.9rem;
        }
        @media (max-width: 760px) {
            .photo-layout { grid-template-columns: 1fr; }
            .photo-timeline { min-height: auto; order: 2; }
            .photo-camera { order: 1; }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="photo-header">
            <h1>拍照留念</h1>
            <p>用相机记录这一刻，照片会保存到时光轴。</p>
        </header>

        <section class="photo-layout">
            <aside class="photo-timeline">
                <div class="tl-heading">时光轴</div>
                <div id="tlItems" class="tl-items">
                    <div class="tl-empty">加载中...</div>
                </div>
            </aside>

            <section class="photo-camera">
                <div class="camera-stage">
                    <video id="photoVideo" autoplay playsinline></video>
                    <canvas id="photoCanvas"></canvas>
                    <div class="photo-preview-area" id="photoPreviewArea">
                        <canvas id="photoPreviewCanvas"></canvas>
                    </div>
                </div>
                <div class="photo-note">
                    <input type="text" id="photoNote" placeholder="为这张照片写个备注（选填）" maxlength="50">
                </div>
                <div class="photo-actions">
                    <button class="photo-btn photo-btn-primary" id="photoCaptureBtn">拍照</button>
                    <button class="photo-btn hidden" id="photoRejectBtn">重新拍摄</button>
                    <button class="photo-btn photo-btn-success hidden" id="photoSaveBtn">保存留念</button>
                </div>
            </section>
        </section>

        <nav class="photo-bottom-bar">
            <button class="link-btn" id="photoEnterLink">进入惊喜</button>
            <button class="link-btn" id="photoBackLink">返回首页</button>
        </nav>
    </main>

    <script>
        (function() {
            function xorDecrypt(b64, key) {
                const str = atob(b64);
                let r = "";
                for (let i = 0; i < str.length; i++) r += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                return r;
            }

            const GITHUB_TOKEN = xorDecrypt("CREHLDp+VUEaPUQcNAN7YyMAOSAneH1TPyBHMkZxAXgZDERCMHlgWw==", "nywsr724");
            const ISSUES_API = "https://api.github.com/repos/raoroger380/nywsr724/issues";
            const photoVideo = document.getElementById("photoVideo");
            const photoCanvas = document.getElementById("photoCanvas");
            const photoPreviewArea = document.getElementById("photoPreviewArea");
            const photoPreviewCanvas = document.getElementById("photoPreviewCanvas");
            const photoCaptureBtn = document.getElementById("photoCaptureBtn");
            const photoRejectBtn = document.getElementById("photoRejectBtn");
            const photoSaveBtn = document.getElementById("photoSaveBtn");
            const photoNote = document.getElementById("photoNote");
            const tlItems = document.getElementById("tlItems");
            let photoStream = null;
            let capturedBlob = null;
            let photoSaving = false;

            function escapeHtml(str) {
                const div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            function showToast(text) {
                document.querySelector(".toast")?.remove();
                const toast = document.createElement("div");
                toast.className = "toast";
                toast.textContent = text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2200);
            }

            async function startCamera() {
                try {
                    photoStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "user", width: { ideal: 960 }, height: { ideal: 720 } }
                    });
                    photoVideo.srcObject = photoStream;
                    await photoVideo.play();
                    resetCameraView();
                } catch (e) {
                    showToast("无法打开摄像头，请检查权限设置");
                }
            }

            function stopCamera() {
                if (photoStream) photoStream.getTracks().forEach(track => track.stop());
                photoStream = null;
                photoVideo.srcObject = null;
            }

            function resetCameraView() {
                photoPreviewArea.classList.remove("show");
                photoCanvas.style.display = "none";
                photoVideo.style.display = "block";
                photoCaptureBtn.classList.remove("hidden");
                photoRejectBtn.classList.add("hidden");
                photoSaveBtn.classList.add("hidden");
                capturedBlob = null;
            }

            photoCaptureBtn.addEventListener("click", () => {
                const vw = photoVideo.videoWidth;
                const vh = photoVideo.videoHeight;
                if (!vw || !vh) return;
                photoCanvas.width = vw;
                photoCanvas.height = vh;
                const ctx = photoCanvas.getContext("2d");
                ctx.translate(vw, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(photoVideo, 0, 0, vw, vh);
                photoCanvas.toBlob(blob => {
                    capturedBlob = blob;
                    const previewCtx = photoPreviewCanvas.getContext("2d");
                    photoPreviewCanvas.width = vw;
                    photoPreviewCanvas.height = vh;
                    previewCtx.drawImage(photoCanvas, 0, 0, vw, vh);
                    photoPreviewArea.classList.add("show");
                    photoVideo.style.display = "none";
                    photoCanvas.style.display = "block";
                    photoCaptureBtn.classList.add("hidden");
                    photoRejectBtn.classList.remove("hidden");
                    photoSaveBtn.classList.remove("hidden");
                }, "image/jpeg", 0.85);
            });

            photoRejectBtn.addEventListener("click", resetCameraView);

            photoSaveBtn.addEventListener("click", async () => {
                if (photoSaving || !capturedBlob) return;
                photoSaving = true;
                photoSaveBtn.disabled = true;
                photoSaveBtn.textContent = "保存中...";
                try {
                    const b64 = await blobToBase64(capturedBlob);
                    const note = photoNote.value.trim() || "生日留念";
                    const timestamp = new Date().toISOString();
                    const res = await fetch(ISSUES_API, {
                        method: "POST",
                        headers: {
                            "Authorization": `token ${GITHUB_TOKEN}`,
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            title: `照片 ${note}`,
                            body: `photo:true\ndate:${timestamp}\nimage:${b64}`,
                            labels: ["photo"],
                        }),
                    });
                    if (!res.ok) throw new Error("Save failed");
                    showToast("照片已保存到时光轴");
                    photoNote.value = "";
                    resetCameraView();
                    await loadPhotoTimeline();
                } catch (e) {
                    showToast("保存失败，请稍后再试");
                } finally {
                    photoSaving = false;
                    photoSaveBtn.disabled = false;
                    photoSaveBtn.textContent = "保存留念";
                }
            });

            function blobToBase64(blob) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(",")[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            }

            async function loadPhotoTimeline() {
                try {
                    const res = await fetch(`${ISSUES_API}?labels=photo&state=all&per_page=100&sort=created&direction=desc`);
                    if (!res.ok) throw new Error("Fetch failed");
                    renderTimeline(await res.json());
                } catch (e) {
                    tlItems.innerHTML = "<div class=\"tl-empty\">加载失败</div>";
                }
            }

            function renderTimeline(issues) {
                const photos = issues.filter(issue => issue.state === "open");
                if (photos.length === 0) {
                    tlItems.innerHTML = "<div class=\"tl-empty\">还没有照片，拍下第一张吧</div>";
                    return;
                }
                tlItems.innerHTML = photos.map((issue, idx) => {
                    const note = issue.title.replace(/^照片\s*/, "");
                    const body = issue.body || "";
                    const dateMatch = body.match(/date:([^\n]+)/);
                    const imgMatch = body.match(/image:([^\n]+)/);
                    return `
                        <div class="tl-item ${idx === 0 ? "active" : ""}" data-image="${imgMatch ? imgMatch[1] : ""}">
                            <div class="tl-dot"></div>
                            <div>
                                <div class="tl-title">${escapeHtml(note)}</div>
                                <div class="tl-time">${dateMatch ? formatTime(dateMatch[1]) : ""}</div>
                            </div>
                        </div>
                    `;
                }).join("");
                tlItems.querySelectorAll(".tl-item").forEach(item => {
                    item.addEventListener("click", () => {
                        tlItems.querySelectorAll(".tl-item").forEach(el => el.classList.remove("active"));
                        item.classList.add("active");
                        if (item.dataset.image) showTimelinePhoto(item.dataset.image);
                    });
                });
                const first = tlItems.querySelector(".tl-item");
                if (first?.dataset.image) showTimelinePhoto(first.dataset.image);
            }

            function showTimelinePhoto(b64) {
                const img = new Image();
                img.onload = () => {
                    photoPreviewCanvas.width = img.naturalWidth;
                    photoPreviewCanvas.height = img.naturalHeight;
                    photoPreviewCanvas.getContext("2d").drawImage(img, 0, 0);
                    photoPreviewArea.classList.add("show");
                    photoVideo.style.display = "none";
                    photoCanvas.style.display = "block";
                    photoCaptureBtn.classList.add("hidden");
                    photoRejectBtn.classList.add("hidden");
                    photoSaveBtn.classList.add("hidden");
                };
                img.src = `data:image/jpeg;base64,${b64}`;
            }

            function formatTime(iso) {
                const d = new Date(iso);
                const month = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");
                const hour = String(d.getHours()).padStart(2, "0");
                const min = String(d.getMinutes()).padStart(2, "0");
                return `${month}-${day} ${hour}:${min}`;
            }

            document.getElementById("photoEnterLink").addEventListener("click", () => {
                stopCamera();
                window.location.href = "jingxi.html";
            });
            document.getElementById("photoBackLink").addEventListener("click", () => {
                stopCamera();
                window.location.href = "index.html";
            });
            window.addEventListener("beforeunload", stopCamera);

            loadPhotoTimeline();
            startCamera();
        })();
    </script>
</body>
</html>
