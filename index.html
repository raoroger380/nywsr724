<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>农友维 · 生日祝福</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --paper: rgba(255, 255, 255, 0.82);
            --paper-strong: rgba(255, 255, 255, 0.94);
            --glass: var(--paper);
            --glass-border: rgba(59, 130, 246, 0.18);
            --glass-hover: rgba(59, 130, 246, 0.07);
            --accent: #3b82f6;
            --accent-rgb: 59, 130, 246;
            --accent-soft: rgba(var(--accent-rgb), 0.08);
            --accent-glow: rgba(var(--accent-rgb), 0.12);
            --candle: #d69b43;
            --heart: #c96f8f;
            --line: rgba(var(--accent-rgb), 0.16);
            --shadow-soft: 0 24px 70px rgba(86, 102, 126, 0.12);
            --text: #243044;
            --text-secondary: #6f7a8b;
            --font-display: "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", "STSong", serif;
            --font-body: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-lg: 24px;
        }
        * { box-sizing: border-box; }
        [hidden] { display: none !important; }
        html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
        body {
            font-family: var(--font-body);
            overflow-x: hidden;
            background: var(--bg);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.24;
            background-image:
                radial-gradient(circle at 20% 18%, rgba(59,130,246,0.10) 0 1px, transparent 1.5px),
                radial-gradient(circle at 82% 12%, rgba(37,99,235,0.09) 0 1px, transparent 1.5px),
                linear-gradient(135deg, rgba(59,130,246,0.045), transparent 42%);
            background-size: 18px 18px, 26px 26px, 100% 100%;
            mix-blend-mode: soft-light;
        }
        body.dark::before { opacity: 0; }
        :where(button, a, input, textarea, [role="button"], [tabindex]):focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            box-shadow: 0 0 0 6px rgba(var(--accent-rgb), 0.14);
        }
        .confetti-container {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 8px; height: 8px;
            opacity: 0.6;
            animation: confetti-fall linear infinite;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.1; }
        }

        #bg, #textFx {
            position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; display: block;
        }
        #bg { z-index: 0; }
        #textFx { z-index: 2; pointer-events: none; }
        .screen {
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 3;
            display: grid;
            place-items: center;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .hidden { display: none !important; }

        #cakeScreen {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px;
            padding-bottom: max(30px, env(safe-area-inset-bottom));
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        .cake-stage {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cake-layer {
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.5), 0 6px 20px rgba(0,0,0,0.06);
            position: relative;
            margin-top: -2px;
            opacity: 0;
            animation-fill-mode: forwards;
            transform-origin: center bottom;
        }
        .cake-layer.show { opacity: 1; }
        .layer1 { width: 180px; height: 50px; background: #f5e6d3; z-index: 3; }
        .layer2 { width: 210px; height: 45px; background: #eddcc8; z-index: 2; }
        .layer3 { width: 240px; height: 40px; background: #e8d4be; z-index: 1; }
        .drip-cream {
            position: absolute;
            top: -86px; left: 50%; transform: translateX(-50%);
            width: 188px; height: 38px;
            background:
                radial-gradient(circle at 22% 32%, rgba(255,255,255,0.72) 0 9px, transparent 10px),
                radial-gradient(circle at 62% 24%, rgba(255,255,255,0.48) 0 7px, transparent 8px),
                linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(238, 222, 204, 0.96));
            border-radius: 46% 54% 42% 58% / 66% 72% 38% 34%;
            box-shadow:
                inset 0 5px 9px rgba(255,255,255,0.62),
                inset 0 -7px 12px rgba(196,150,112,0.16),
                0 6px 14px rgba(87,60,40,0.09);
            z-index: 10; opacity: 0;
            filter: url(#creamGoo);
            transform-origin: center top;
            will-change: transform, top, border-radius;
        }
        .drip-cream.show { opacity: 1; top: -14px; animation: creamFlowDrop 1.55s cubic-bezier(0.2, 0.82, 0.18, 1) forwards, creamSlowOoze 2.8s ease-in-out 1.15s infinite alternate; }
        @keyframes creamOoze {
            0% { transform: translateX(-50%) scaleX(0.4) scaleY(0.2); opacity: 0; border-radius: 50%; }
            50% { transform: translateX(-50%) scaleX(1.08) scaleY(0.9); opacity: 1; border-radius: 50%; }
            100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 1; border-radius: 50%; }
        }
        @keyframes creamFlowDrop {
            0% {
                top: -96px;
                opacity: 0;
                transform: translateX(-50%) scaleX(0.48) scaleY(1.9);
                border-radius: 50% 50% 46% 54% / 78% 78% 26% 26%;
            }
            38% {
                top: -18px;
                opacity: 1;
                transform: translateX(-50%) scaleX(0.76) scaleY(1.28);
                border-radius: 46% 54% 38% 62% / 62% 70% 34% 30%;
            }
            55% {
                top: -11px;
                transform: translateX(-50%) scaleX(1.22) scaleY(0.58);
                border-radius: 38% 62% 36% 64% / 72% 64% 36% 30%;
            }
            72% {
                top: -15px;
                transform: translateX(-50%) scaleX(0.94) scaleY(1.12);
            }
            86% {
                top: -13px;
                transform: translateX(-50%) scaleX(1.05) scaleY(0.9);
            }
            100% {
                top: -14px;
                opacity: 1;
                transform: translateX(-50%) scaleX(1) scaleY(1);
                border-radius: 46% 54% 42% 58% / 66% 72% 38% 34%;
            }
        }
        @keyframes creamSlowOoze {
            0% {
                transform: translateX(-50%) scaleX(1) scaleY(1);
                border-radius: 46% 54% 42% 58% / 66% 72% 38% 34%;
            }
            100% {
                transform: translateX(-50%) scaleX(1.025) scaleY(0.985);
                border-radius: 50% 50% 40% 60% / 68% 70% 40% 32%;
            }
        }
        .drip-cream::after {
            content: ""; position: absolute; bottom: -22px; left: 17px;
            width: 24px; height: 34px;
            background: linear-gradient(180deg, rgba(255,253,248,0.98), rgba(235,216,198,0.96));
            border-radius: 45% 55% 62% 38% / 22% 22% 76% 78%;
            box-shadow:
                48px -5px 0 -6px rgba(248,238,226,0.98),
                86px 3px 0 -3px rgba(244,232,218,0.96),
                124px -8px 0 -8px rgba(250,241,230,0.96),
                inset 0 -5px 8px rgba(190,145,108,0.13);
            animation: creamDripFlow 2.2s ease-in-out 1.05s infinite alternate;
        }
        .drip-cream::before {
            content: ""; position: absolute; bottom: -14px; right: 18px;
            width: 18px; height: 26px;
            background: linear-gradient(180deg, rgba(255,253,248,0.98), rgba(235,216,198,0.96));
            border-radius: 50% 50% 70% 30% / 20% 22% 78% 78%;
            box-shadow:
                -74px 6px 0 -5px rgba(246,234,220,0.96),
                -112px -3px 0 -8px rgba(250,241,230,0.94),
                inset 0 -5px 8px rgba(190,145,108,0.12);
            animation: creamDripFlow 2.6s ease-in-out 1.25s infinite alternate-reverse;
        }
        @keyframes creamDripFlow {
            0% { transform: translateY(-1px) scaleY(0.86) scaleX(1.05); }
            100% { transform: translateY(5px) scaleY(1.18) scaleX(0.92); }
        }
        .candle {
            width: 14px; height: 36px;
            background: linear-gradient(180deg, #fff 0%, #f5e6d3 80%);
            border-radius: 10px;
            position: absolute; top: -44px; left: 50%; margin-left: -7px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 12; opacity: 0;
            transition: all 0.5s ease;
        }
        .candle.show { opacity: 1; top: -48px; }
        .flame {
            position: absolute; left: 50%; top: -18px;
            width: 14px; height: 18px; margin-left: -7px;
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            background: radial-gradient(circle at 50% 40%, #fff8af, #f5c840 50%, #d08020 80%);
            animation: flicker 800ms ease-in-out infinite alternate;
            box-shadow: 0 0 16px rgba(245, 200, 64, 0.6);
            transition: opacity 0.4s;
        }
        .flame.off { opacity: 0; animation: none; }
        .flame.wobble {
            animation: flameWobble 0.12s ease-in-out infinite !important;
        }
        @keyframes flameWobble {
            0% { transform: translateX(0) scale(1) rotate(0deg); }
            20% { transform: translateX(-3px) scale(0.75, 1.35) rotate(-4deg); }
            40% { transform: translateX(2.5px) scale(1.15, 0.65) rotate(3deg); }
            60% { transform: translateX(-2px) scale(0.8, 1.2) rotate(-3deg); }
            80% { transform: translateX(1.5px) scale(1.05, 0.85) rotate(2deg); }
            100% { transform: translateX(0) scale(1) rotate(0deg); }
        }
        .happy-birthday-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.8rem, 8vw, 5rem);
            color: var(--accent);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3), 0 0 40px rgba(59, 130, 246, 0.1);
            text-align: center; line-height: 1.2;
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s ease;
            position: absolute;
            left: 50%; transform: translateX(-50%);
        }
        .happy-birthday-text.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #micBtn {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 14px 36px;
            font-weight: 500;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: absolute;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            margin-bottom: env(safe-area-inset-bottom);
        }
        #micBtn:hover {
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.25);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        #blowMeter {
            width: 200px; height: 6px; border-radius: 10px;
            background: rgba(59, 130, 246, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            overflow: hidden;
            position: absolute;
        }
        #blowMeter i {
            display: block; height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            border-radius: 10px;
            transition: width 90ms linear;
        }

        .hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.08);
            border-radius: 12px;
            padding: 6px 18px;
            letter-spacing: 0.5px;
        }
        button.hint {
            font-family: inherit;
            border: 1px solid rgba(59, 130, 246, 0.08);
        }
        .skip-hint {
            color: var(--accent) !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            background: rgba(255,255,255,0.6) !important;
            border-color: rgba(59,130,246,0.25) !important;
            cursor: pointer !important;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s ease;
        }
        .skip-hint:hover {
            background: rgba(255,255,255,0.8) !important;
            box-shadow: 0 0 20px rgba(59,130,246,0.15);
        }

        @keyframes dropSplat {
            0% { transform: translateY(-380px) scaleX(1) scaleY(1); opacity: 0; }
            48% { transform: translateY(3px) scaleX(0.96) scaleY(1.12); opacity: 1; }
            60% { transform: translateY(0) scaleX(1.24) scaleY(0.65); }
            74% { transform: translateY(0) scaleX(0.97) scaleY(1.08); }
            88% { transform: translateY(0) scaleX(1.02) scaleY(0.96); }
            100% { transform: translateY(0) scaleX(1) scaleY(1); opacity: 1; }
        }
        .splat-in { animation: dropSplat 0.7s cubic-bezier(0.22, 0.9, 0.35, 1.15) forwards; }

        @keyframes flicker {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            20% { transform: translateY(-2.5px) scale(1.08, 1.12) rotate(-1deg); }
            40% { transform: translateY(0.5px) scale(0.9, 0.85) rotate(0.5deg); }
            60% { transform: translateY(-1.5px) scale(1.05, 1.08) rotate(-0.8deg); }
            80% { transform: translateY(0) scale(0.95, 0.92) rotate(0.3deg); }
            100% { transform: translateY(-1px) scale(1.02, 1.05) rotate(0deg); }
        }
        .flame-glow {
            position: absolute;
            left: -10px; top: -10px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,200,64,0.25) 0%, transparent 70%);
            animation: glowPulse 1.2s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes glowPulse {
            0% { transform: scale(0.7); opacity: 0.3; }
            100% { transform: scale(1.4); opacity: 0.7; }
        }

        .bless-wrap {
            position: relative;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(59, 130, 246, 0.12);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.06), 0 0 30px var(--accent-glow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            overflow: hidden;
            width: 100px; height: 100px; border-radius: 50%;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.3, 1);
        }
        .bless-wrap.expanded {
            width: min(90%, 700px);
            height: auto;
            min-height: 300px;
            border-radius: var(--radius-lg);
            padding: 30px;
            border-color: rgba(59, 130, 246, 0.2);
        }
        .bless-content {
            opacity: 0;
            transition: opacity 0.4s;
            text-align: center;
            width: 100%;
        }
        .bless-wrap.expanded .bless-content {
            opacity: 1;
            transition-delay: 0.4s;
        }
        .bless-title {
            margin: 0;
            font-size: clamp(1.6rem, 4.5vw, 2.2rem);
            font-weight: 400;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            letter-spacing: 2px;
            font-family: var(--font-display);
            text-wrap: balance;
        }
        .bless-text {
            white-space: pre-line;
            line-height: 2;
            color: var(--text);
            font-size: clamp(1rem, 2.4vw, 1.15rem);
            min-height: 150px;
            font-weight: 300;
        }
        .enter-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 400;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            background: rgba(59, 130, 246, 0.04);
        }
        .enter-link:hover {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #danmakuContainer {
            position: fixed; inset: 0; z-index: 5;
            pointer-events: none; overflow: hidden;
        }
        .danmaku {
            position: absolute;
            white-space: nowrap;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            animation: danmakuScroll linear forwards;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.15);
        }
        @keyframes danmakuScroll {
            0% { transform: translateX(100vw); opacity: 0.5; }
            8% { opacity: 0.85; }
            85% { opacity: 0.85; }
            100% { transform: translateX(-100%); opacity: 0; }
        }

        #wishOverlay {
            position: fixed; inset: 0; z-index: 50;
            display: none;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.12);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #wishOverlay.show { display: flex; }
        .wish-card {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            text-align: center;
            max-width: 380px; width: 88%;
            box-shadow: 0 24px 80px rgba(59,130,246,0.12);
            animation: wishPopIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes wishPopIn {
            0% { transform: scale(0.78); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .wish-emoji { font-size: 2.6rem; margin-bottom: 10px; }
        .wish-title { font-size: 1.5rem; color: var(--accent); font-weight: 400; margin-bottom: 12px; letter-spacing: 2px; }
        .wish-desc { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.8; }
        .wish-countdown { margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary); opacity: 0.6; }

        #ambientLights {
            position: fixed;
            left: 0; top: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 4;
        }
        .ambient-light {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.07s ease, box-shadow 0.07s ease;
            will-change: opacity, box-shadow;
        }

        /* 生日倒计时 */
        #countdownOverlay {
            position: fixed; inset: 0; z-index: 99999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--bg);
            background: radial-gradient(ellipse at 50% 30%, rgba(59,130,246,0.04) 0%, transparent 60%), var(--bg);
            transition: opacity 0.8s ease;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            box-sizing: border-box;
        }
        #countdownOverlay.hidden { opacity: 0; pointer-events: none; }
        .cd-card {
            text-align: center;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(59,130,246,0.12);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(59,130,246,0.08);
            max-width: 520px; width: 90%;
            animation: cdFadeIn 0.8s ease;
        }
        @keyframes cdFadeIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .cd-title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            color: var(--accent);
            letter-spacing: 4px;
            font-weight: 400;
            margin-bottom: 4px;
            text-shadow: 0 0 20px rgba(59,130,246,0.15);
        }
        .cd-label {
            font-size: 1rem; color: var(--text-secondary);
            letter-spacing: 4px; font-weight: 300;
            margin-bottom: 24px;
        }
        .cd-numbers {
            display: flex; justify-content: center; align-items: baseline;
            gap: 4px; margin-bottom: 20px;
        }
        .cd-unit {
            display: flex; flex-direction: column; align-items: center;
            min-width: 64px;
        }
        .cd-unit .num {
            font-size: clamp(2.4rem, 6vw, 3.6rem);
            font-weight: 300; color: var(--accent);
            letter-spacing: 2px;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(59,130,246,0.15);
        }
        .cd-unit small {
            font-size: 0.7rem; color: var(--text-secondary);
            letter-spacing: 1px; margin-top: 2px;
        }
        .cd-sep {
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            color: var(--accent); opacity: 0.35;
            font-weight: 200; margin: 0 2px;
            padding-bottom: 18px;
        }
        @keyframes slideUpIn { 0% { transform: translateY(100%); opacity: 0.4; } 100% { transform: translateY(0); opacity: 1; } }
        .cd-realage {
            margin-top: 16px;
            font-size: 1rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            font-weight: 300;
        }
        .cd-realage .age-num {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(59,130,246,0.2);

            let photoParticleLoad;

            function getParticleCount() {
                const area = window.innerWidth * window.innerHeight;
                const cpu = navigator.hardwareConcurrency || 4;
                const memory = navigator.deviceMemory || 4;
                if (reduceMotion) return area < 420000 ? 900 : 1400;
                if (cpu <= 4 || memory <= 4) return area < 420000 ? 1800 : 2400;
                if (area < 420000) return 2400;
                if (area < 920000) return 3200;
                return 4000;
            }

            function getPhotoParticleCount() {
                const area = window.innerWidth * window.innerHeight;
                const cpu = navigator.hardwareConcurrency || 4;
                const memory = navigator.deviceMemory || 4;
                if (reduceMotion) return area < 420000 ? 1800 : 3000;
                if (cpu <= 4 || memory <= 4) return area < 420000 ? 3200 : 4800;
                if (area < 420000) return 5200;

            function getParticlePalette() {
                return document.body.classList.contains("dark") ? PARTICLE_THEME.dark : PARTICLE_THEME.light;
            }

            function syncParticleColors() {
                const palette = getParticlePalette();
                dots.forEach(dot => {
                    dot.hue = palette.textHueBase + (dot.seed - 0.5) * palette.textHueRange;
                    if (!String(dot.mode || "").startsWith("photo")) dot.color = null;
                });
            }

            function hash01(x, y) {
                const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                return n - Math.floor(n);
            }

            function shufflePoints(points) {
                for (let i = points.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [points[i], points[j]] = [points[j], points[i]];
                }
                return points;
            }

            function createDot(mode = "text") {
                const seed = Math.random();
                const depth = Math.pow(Math.random(), 1.8);
                return {
                    x: Math.random() * w,
                    y: Math.random() * h,
                    tx: Math.random() * w,
                    ty: Math.random() * h,
                    vx: 0,
                    vy: 0,
                    a: 0.42 + depth * 0.5,
                    hue: getParticlePalette().textHueBase + (seed - 0.5) * getParticlePalette().textHueRange,
                    radius: 0.9 + depth * 1.35,
                    targetRadius: 1.05 + depth * 1.55,
                    seed,
                    delay: Math.random() * 0.4,

                    depth,
                    twinkle: Math.random() * Math.PI * 2,
                    color: null,

                const particleCount = getParticleCount();
                dots = Array.from({ length: particleCount }, () => createDot("text"));
            }

                const targetCount = getPhotoParticleCount();
                while (dots.length < targetCount) {
                    dots.push(createDot("photo"));

                if (!document.fonts || !document.fonts.ready) return;
                try {
                    const fontLoads = FONT_CANDIDATES.map(fontFamily =>
                        document.fonts.load(`800 72px ${fontFamily}`, `${friendName} Happy Birthday`)
                    );
                    await Promise.race([

                        new Promise(resolve => setTimeout(resolve, 2600))
                    ]);

                const count = reduceMotion ? 10 : 40;
                for (let i=0; i<count; i++) {
                    const piece = document.createElement("div");
                    piece.className = "confetti-piece";
                    piece.style.left = Math.random() * 100 + "%";
                    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    piece.style.animationDuration = (Math.random() * 3 + 5) + "s";
                    piece.style.animationDelay = Math.random() * 6 + "s";

                    dots.forEach(dot => {
                        dot.x = Math.min(Math.max(dot.x, 0), w);
                        dot.y = Math.min(Math.max(dot.y, 0), h);

                        dot.ty = Math.min(Math.max(dot.ty, 0), h);

            window.addEventListener("resize", resize);

            const balloons = [];
            const balloonColors = [
                "rgba(176, 196, 220, 0.32)",
                "rgba(232, 210, 176, 0.28)",
                "rgba(214, 185, 132, 0.30)",
                "rgba(140, 172, 210, 0.26)"
            ];
            for (let i=0; i<14; i++) {
                balloons.push({
                    x: Math.random() * w, y: h + Math.random() * 200,
                    radius: 22 + Math.random() * 20,
                    color: balloonColors[Math.floor(Math.random() * balloonColors.length)],
                    speed: 0.4 + Math.random() * 0.7,
                    wave: Math.random() * Math.PI*2, amplitude: 0.6 + Math.random() * 1.2,
                    opacity: 0.36 + Math.random() * 0.18, stringLength: 40 + Math.random() * 30
                });

            function drawBalloons(ctx) {
                for (let b of balloons) {
                    ctx.save(); ctx.globalAlpha = b.opacity;
                    ctx.beginPath();
                    ctx.ellipse(b.x, b.y, b.radius, b.radius*1.2, 0, 0, Math.PI*2);
                    ctx.fillStyle = b.color; ctx.fill();
                    ctx.strokeStyle = 'rgba(63, 127, 190, 0.12)'; ctx.lineWidth = 1; ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(b.x - b.radius*0.25, b.y - b.radius*0.2, b.radius*0.15, b.radius*0.2, 0, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(196, 158, 92, 0.34)'; ctx.fill();
                    ctx.fillStyle = 'rgba(63, 127, 190, 0.16)';
                    ctx.fillRect(b.x-3, b.y+b.radius*1.05, 6, 6);
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y+b.radius*1.2);
                    ctx.lineTo(b.x + Math.sin(b.x*0.01)*2, b.y+b.radius*1.2+b.stringLength);

            function updateBalloons() {

            const bgParticles = Array.from({ length: 50 }, () => ({

            }));
            function drawPhotoAtmosphere(ctx, time) {
                const palette = getParticlePalette();
                const cx = w / 2;
                const cy = h / 2;
                const radius = Math.max(w, h) * 0.72;
                const stage = ctx.createRadialGradient(cx, cy, Math.min(w, h) * 0.08, cx, cy, radius);
                stage.addColorStop(0, palette.photoGlow);
                stage.addColorStop(0.38, palette.bgMist.replace(/[\d.]+\)$/,'0.08)'));
                stage.addColorStop(0.72, "rgba(18, 24, 34, 0.10)");
                stage.addColorStop(1, "rgba(10, 14, 22, 0.22)");
                ctx.fillStyle = stage;
                ctx.fillRect(0, 0, w, h);

            function fitFontSize(text, maxSize, fontFamily) {
                const cw = off.width;
                let size = Math.min(maxSize, Math.floor(w * 0.2));
                offCtx.setTransform(1,0,0,1,0,0);
                offCtx.font = `800 ${size*dpr}px ${fontFamily}`;
                const maxWidth = cw * 0.82;
                while (offCtx.measureText(text).width > maxWidth && size > 40) {
                    size -= 4;
                    offCtx.font = `800 ${size*dpr}px ${fontFamily}`;
                }
                return size;
            }
            function collectTextPoints(sourceCtx, sourceCanvas) {
                const cw = sourceCanvas.width, ch = sourceCanvas.height;
                if (!cw || !ch) return [];
                const cssStep = Math.max(1, Math.floor(Math.min(w,h)/270));
                const step = Math.max(1, Math.round(cssStep * dpr));
                const img = sourceCtx.getImageData(0,0,cw,ch).data;
                const pts = [];
                const alphaAt = (x, y) => img[(Math.max(0, Math.min(ch - 1, y)) * cw + Math.max(0, Math.min(cw - 1, x))) * 4 + 3] || 0;
                for (let y=0; y<ch; y+=step) {
                    for (let x=0; x<cw; x+=step) {
                        const a = alphaAt(x, y);
                        if (a <= 120) continue;
                        const edge =
                            Math.abs(a - alphaAt(x - step, y)) > 72 ||
                            Math.abs(a - alphaAt(x + step, y)) > 72 ||
                            Math.abs(a - alphaAt(x, y - step)) > 72 ||
                            Math.abs(a - alphaAt(x, y + step)) > 72;
                        const keep = edge || hash01(x, y) > 0.26;
                        if (!keep) continue;
                        const jitter = edge ? 0.18 : 0.72;
                        const jx = (hash01(x + 17, y + 31) - 0.5) * step * jitter;
                        const jy = (hash01(x + 43, y + 11) - 0.5) * step * jitter;
                        pts.push({
                            x: (x + jx) / dpr,
                            y: (y + jy) / dpr,
                            edge,
                            weight: edge ? 1 : 0.72,
                            jitter
                        });
                    }
                }
                return pts;
            }

            function getTextPointsFromCanvas(text, sizePx, fontFamily) {
                const cw = off.width, ch = off.height;
                offCtx.setTransform(1,0,0,1,0,0);
                offCtx.clearRect(0,0,cw,ch);
                offCtx.fillStyle = "#fff";
                offCtx.textAlign = "center";
                offCtx.textBaseline = "middle";
                offCtx.font = `800 ${sizePx*dpr}px ${fontFamily}`;
                offCtx.fillText(text, cw/2, ch/2);
                return collectTextPoints(offCtx, off);
            }

            function loadPhotoParticleImage() {
                if (photoParticleImage.complete && photoParticleImage.naturalWidth) {
                    return Promise.resolve(photoParticleImage);
                }
                if (!photoParticleLoad) {
                    photoParticleLoad = new Promise((resolve, reject) => {
                        photoParticleImage.onload = () => resolve(photoParticleImage);
                        photoParticleImage.onerror = () => reject(new Error("照片加载失败"));
                    });
                }
                return photoParticleLoad;
            }

            async function getPhotoParticlePoints() {
                const image = await loadPhotoParticleImage();
                // 裁去上方大面积夜景，让两个人的脸占据大部分粒子画面。
                const crop = { left: 0.02, top: 0.14, right: 0.98, bottom: 1 };
                const displaySize = Math.min(w * 0.86, h * 0.84, 720);
                const displayWidth = displaySize;
                const displayHeight = displaySize;

                const sampleCanvas = document.createElement("canvas");
                const sampleWidth = Math.min(820, Math.round(displayWidth * dpr));
                const sampleHeight = sampleWidth;
                sampleCanvas.width = sampleWidth;
                sampleCanvas.height = sampleHeight;
                const sampleCtx = sampleCanvas.getContext("2d", { willReadFrequently: true });
                let sx = image.naturalWidth * crop.left;
                let sy = image.naturalHeight * crop.top;
                let sw = image.naturalWidth * (crop.right - crop.left);
                let sh = image.naturalHeight * (crop.bottom - crop.top);
                const cropRatio = sw / sh;
                if (cropRatio > 1) {
                    const nextSw = sh;
                    sx += (sw - nextSw) / 2;
                    sw = nextSw;
                } else if (cropRatio < 1) {
                    const nextSh = sw;
                    sy += (sh - nextSh) * 0.42;
                    sh = nextSh;
                }
                sampleCtx.drawImage(image, sx, sy, sw, sh, 0, 0, sampleWidth, sampleHeight);
                const pixels = sampleCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
                const left = (w - displayWidth) / 2;
                const top = (h - displayHeight) / 2;
                const centerX = sampleWidth / 2;
                const centerY = sampleHeight / 2;
                const maxCenterDist = Math.hypot(centerX, centerY) || 1;
                const step = Math.max(2, Math.round(Math.sqrt((sampleWidth * sampleHeight) / Math.max(1, dots.length * 1.35))));
                const pts = [];
                const pixelIndex = (x, y) => (Math.max(0, Math.min(sampleHeight - 1, y)) * sampleWidth + Math.max(0, Math.min(sampleWidth - 1, x))) * 4;
                const lumaAt = (x, y) => {
                    const idx = pixelIndex(x, y);
                    return 0.2126 * pixels[idx] + 0.7152 * pixels[idx + 1] + 0.0722 * pixels[idx + 2];
                };
                const isInsideHeart = (x, y) => {
                    const nx = (x / sampleWidth - 0.5) * 2.34;
                    const ny = (y / sampleHeight - 0.48) * -2.34;
                    const v = nx * nx + ny * ny - 1;
                    return (v * v * v - nx * nx * ny * ny * ny) <= 0;
                };
                const heartEdgeStrength = (x, y) => {
                    const gap = step * 1.4;
                    return (
                        (isInsideHeart(x - gap, y) ? 0 : 1) +
                        (isInsideHeart(x + gap, y) ? 0 : 1) +
                        (isInsideHeart(x, y - gap) ? 0 : 1) +
                        (isInsideHeart(x, y + gap) ? 0 : 1)
                    );
                };

                for (let y = 0; y < sampleHeight; y += step) {
                    for (let x = 0; x < sampleWidth; x += step) {
                        if (!isInsideHeart(x, y)) continue;
                        const index = (y * sampleWidth + x) * 4;
                        const alpha = pixels[index + 3];
                        if (alpha < 80) continue;
                        const r = pixels[index];
                        const g = pixels[index + 1];
                        const b = pixels[index + 2];
                        const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                        const edgeStrength =
                            Math.abs(luma - lumaAt(x - step, y)) +
                            Math.abs(luma - lumaAt(x + step, y)) +
                            Math.abs(luma - lumaAt(x, y - step)) +
                            Math.abs(luma - lumaAt(x, y + step));
                        const heartEdge = heartEdgeStrength(x, y) > 0;
                        const edge = edgeStrength > 96 || heartEdge;
                        const centerBias = 1 - Math.min(1, Math.hypot(x - centerX, y - centerY) / maxCenterDist);
                        const lift = 8 + centerBias * 8;
                        const warm = edge ? 1.025 : 1.005;
                        const rr = Math.min(255, Math.round(r * warm + lift));
                        const gg = Math.min(255, Math.round(g * (edge ? 1.012 : 1.004) + lift));
                        const bb = Math.min(255, Math.round(b + lift * 0.58));
                        const priority = (edge ? 2.25 : 1) + (heartEdge ? 0.65 : 0) + (luma > 128 ? 0.26 : 0) + centerBias * 0.72;
                        pts.push({
                            x: left + (x / sampleWidth) * displayWidth,
                            y: top + (y / sampleHeight) * displayHeight,
                            alpha: Math.max(0.72, alpha / 255),
                            radius: heartEdge ? 1.02 : edge ? 1.08 : 1.34 + (luma / 255) * 0.72 + centerBias * 0.24,
                            edge,
                            heartEdge,
                            luma,
                            priority
                        });
                    }
                }
                shufflePoints(pts);
                pts.sort((a, b) => b.priority - a.priority);
                return pts;
            }

            function getHeartParticlePoints() {
                const displaySize = Math.min(w * 0.74, h * 0.68, 560);
                const centerX = w / 2;
                const centerY = h * 0.48;
                const step = Math.max(2, Math.round(Math.sqrt((displaySize * displaySize) / Math.max(1, dots.length * 1.35))));
                const pts = [];
                const maxDist = displaySize * 0.52;
                const isInsideHeart = (px, py) => {
                    const nx = ((px - centerX) / displaySize) * 2.34;
                    const ny = -((py - centerY) / displaySize) * 2.34 + 0.12;
                    const v = nx * nx + ny * ny - 1;
                    return (v * v * v - nx * nx * ny * ny * ny) <= 0;
                };
                for (let y = centerY - displaySize * 0.58; y <= centerY + displaySize * 0.58; y += step) {
                    for (let x = centerX - displaySize * 0.58; x <= centerX + displaySize * 0.58; x += step) {
                        if (!isInsideHeart(x, y)) continue;
                        const edge =
                            !isInsideHeart(x - step * 1.7, y) ||
                            !isInsideHeart(x + step * 1.7, y) ||
                            !isInsideHeart(x, y - step * 1.7) ||
                            !isInsideHeart(x, y + step * 1.7);
                        const centerBias = 1 - Math.min(1, Math.hypot(x - centerX, y - centerY) / maxDist);
                        const sparkle = hash01(Math.round(x), Math.round(y));
                        pts.push({
                            x,
                            y,
                            alpha: edge ? 0.98 : 0.72 + centerBias * 0.18,
                            radius: edge ? 1.12 : 1.35 + centerBias * 0.58 + sparkle * 0.22,
                            edge,
                            heartEdge: edge,
                            luma: edge ? 235 : 120 + centerBias * 95 + sparkle * 24,
                            priority: (edge ? 2.4 : 1) + centerBias * 0.8 + sparkle * 0.18
                        });
                    }
                }
                shufflePoints(pts);
                pts.sort((a, b) => b.priority - a.priority);
                return pts;
            }

            function assignPhotoTargets(points, options = {}) {
                if (!points || !points.length) return false;
                expandDotsForPhoto();
                const selected = [];
                for (let i = 0; i < dots.length; i++) {
                    selected.push(points[i % points.length]);
                }
                shufflePoints(selected);
                for (let i = 0; i < dots.length; i++) {
                    const point = selected[i];
                    const dot = dots[i];
                    dot.tx = point.x;
                    dot.ty = point.y;
                    dot.color = null;
                    dot.photoLuma = point.luma;
                    dot.photoAlpha = point.alpha;
                    dot.targetRadius = point.radius;
                    dot.delay = options.immediate ? 0 : (point.edge ? Math.random() * 0.18 : 0.12 + Math.random() * 0.45);
                    dot.targetSetAt = performance.now();
                    dot.a = point.edge ? 0.94 : 0.74 + Math.min(0.18, point.luma / 255 * 0.18);
                    dot.mode = point.edge ? "heartEdge" : "heartFill";
                }
                return true;
            }

            function escapeSvgText(text) {
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&apos;");
            }

            async function getTextPointsFromSvg(text, sizePx, fontFamily) {
                const cw = svgMask.width;
                const ch = svgMask.height;
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="${cw}" height="${ch}" viewBox="0 0 ${cw} ${ch}">
                        <rect width="100%" height="100%" fill="black"/>
                        <text
                            x="50%"
                            y="50%"
                            fill="white"
                            font-family="${fontFamily}"
                            font-size="${sizePx * dpr}px"
                            font-weight="800"
                            text-anchor="middle"
                            dominant-baseline="middle">${escapeSvgText(text)}</text>
                    </svg>
                `;
                const img = new Image();
                img.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
                if (img.decode) {
                    try {
                        await img.decode();
                    } catch (e) {
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;

                        });

                    });
                }
                svgMaskCtx.setTransform(1,0,0,1,0,0);
                svgMaskCtx.clearRect(0,0,cw,ch);
                svgMaskCtx.drawImage(img, 0, 0, cw, ch);
                return collectTextPoints(svgMaskCtx, svgMask);

            async function findBestTextPoints(text, maxSize) {
                let bestPts = [];
                let bestSize = maxSize;
                for (const fontFamily of FONT_CANDIDATES) {
                    const size = fitFontSize(text, maxSize, fontFamily);
                    let pts = [];
                    try {
                        pts = await getTextPointsFromSvg(text, size, fontFamily);
                    } catch (e) {}
                    if (pts.length < Math.max(180, dots.length * 0.12)) {
                        const canvasPts = getTextPointsFromCanvas(text, size, fontFamily);
                        if (canvasPts.length > pts.length) pts = canvasPts;
                    }
                    if (pts.length > bestPts.length) {
                        bestPts = pts;
                        bestSize = size;
                    }
                    if (pts.length >= Math.max(180, dots.length * 0.12)) break;
                }
                return { pts: bestPts, size: bestSize };
            }
            // ---- 足球场粒子形状 ----
            function getFootballFieldPoints(w, h, count) {
                const pts = [];
                const ratio = 1.54;
                let fw, fh;
                if (w / h > ratio) { fh = h; fw = fh * ratio; }
                else { fw = w; fh = fw / ratio; }
                const lx = (w - fw) / 2, rx = lx + fw;
                const ty = (h - fh) / 2, by = ty + fh;
                const cx = w / 2, cy = h / 2;
                const cr = fw * 0.10;

                // 按比例分配粒子到各特征
                const parts = [
                    Math.floor(count * 0.30),
                    Math.floor(count * 0.10),
                    Math.floor(count * 0.15),
                    Math.floor(count * 0.20),
                    Math.floor(count * 0.10),
                    Math.floor(count * 0.15),
                ];
                let total = parts.reduce((a,b)=>a+b,0);
                parts[0] += count - total;

                // 1. 外框
                const pl = 2 * (fw + fh);
                for (let i = 0; i < parts[0]; i++) {
                    const t = i / parts[0];
                    const d = t * pl;
                    if (d < fw)           { pts.push({x: lx+d, y: ty}); }
                    else if (d < fw+fh)   { pts.push({x: rx, y: ty+(d-fw)}); }
                    else if (d < 2*fw+fh) { pts.push({x: rx-(d-fw-fh), y: by}); }
                    else                  { pts.push({x: lx, y: by-(d-2*fw-fh)}); }
                }

                // 2. 中场线
                for (let i = 0; i < parts[1]; i++) {
                    const t = i / parts[1];
                    pts.push({x: lx + t*fw, y: cy});
                }

                // 3. 中圈
                for (let i = 0; i < parts[2]; i++) {
                    const a = (i / parts[2]) * 2 * Math.PI;
                    pts.push({x: cx + Math.cos(a)*cr, y: cy + Math.sin(a)*cr});
                }

                // 4. 禁区 (左右各半)
                const pw = fw * 0.22, ph = fh * 0.44;
                const ptop = cy - ph/2, pbot = cy + ph/2;
                for (let side = 0; side < 2; side++) {
                    const n = Math.floor(parts[3] / 2);
                    const baseX = side === 0 ? lx : rx - pw;
                    for (let i = 0; i < n; i++) {
                        const t = i / n;
                        const d = t * 2 * (pw + ph);
                        if (d < pw)           { pts.push({x: baseX+d, y: ptop}); }
                        else if (d < pw+ph)   { pts.push({x: baseX+pw, y: ptop+(d-pw)}); }
                        else if (d < 2*pw+ph) { pts.push({x: baseX+pw-(d-pw-ph), y: pbot}); }
                        else                  { pts.push({x: baseX, y: pbot-(d-2*pw-ph)}); }
                    }
                }

                // 5. 小禁区 (左右各半)
                const gw = fw * 0.08, gh = fh * 0.22;
                const gtop = cy - gh/2, gbot = cy + gh/2;
                for (let side = 0; side < 2; side++) {
                    const n = Math.floor(parts[4] / 2);
                    const baseX = side === 0 ? lx : rx - gw;
                    for (let i = 0; i < n; i++) {
                        const t = i / n;
                        const d = t * 2 * (gw + gh);
                        if (d < gw)           { pts.push({x: baseX+d, y: gtop}); }
                        else if (d < gw+gh)   { pts.push({x: baseX+gw, y: gtop+(d-gw)}); }
                        else if (d < 2*gw+gh) { pts.push({x: baseX+gw-(d-gw-gh), y: gbot}); }
                        else                  { pts.push({x: baseX, y: gbot-(d-2*gw-gh)}); }
                    }
                }

                // 6. 禁区弧 (左右各半圆)
                const arcR = fw * 0.08;
                for (let side = 0; side < 2; side++) {
                    const n = Math.floor(parts[5] / 2);
                    const arcCx = side === 0 ? lx + pw : rx - pw;
                    for (let i = 0; i < n; i++) {
                        const a = Math.PI * (side === 0 ? -0.5 : 0.5) + (i / n) * Math.PI;
                        pts.push({x: arcCx + Math.cos(a)*arcR, y: cy + Math.sin(a)*arcR});
                    }
                }

                // 打乱顺序让过渡更自然
                for (let i = pts.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pts[i], pts[j]] = [pts[j], pts[i]];
                }
                return pts;
            }
            function morphTo(text, maxSize, scatter=false) {
                return new Promise(resolve => {
                    textFx.dataset.particleMode = scatter === "football" ? "lineArt" : "text";
                    const setAt = performance.now();
                    dots.forEach(dot => {
                        dot.color = null;
                        dot.targetRadius = scatter === "football" ? 1.05 + dot.depth * 0.45 : 1.2 + dot.depth * 0.8;
                        dot.mode = scatter === "football" ? "lineArt" : "text";
                        dot.delay = Math.random() * 0.18;
                        dot.targetSetAt = setAt;
                    });
                    if (scatter) {
                        const targets = scatter === 'football' ? getFootballFieldPoints(w, h, dots.length) : null;
                        for (let i = 0; i < dots.length; i++) {
                            if (targets) {

                                dots[i].ty = targets[i].y;

                                bestResult = retryResult;
                            }
                        }
                        const { pts } = bestResult;
                        let selected;
                        if (pts.length >= dots.length) {
                            const sh = shufflePoints([...pts]);
                            selected = sh.slice(0,dots.length);
                        } else if (pts.length>0) {
                            const sh = shufflePoints([...pts]);
                            selected = []; for (let i=0;i<dots.length;i++) selected.push(sh[i%sh.length]);
                        } else { selected = dots.map(d=>({x:d.tx, y:d.ty})); }
                        const targetSetAt = performance.now();
                        for (let i=0;i<dots.length;i++) {
                            const target = selected[i];
                            const wave = (target.x / Math.max(1, w)) * 0.45 + (target.y / Math.max(1, h)) * 0.25;
                            dots[i].tx = target.x;
                            dots[i].ty = target.y;
                            dots[i].mode = "text";
                            dots[i].color = null;
                            dots[i].targetRadius = target.edge ? 1.58 + dots[i].depth * 0.32 : 1.02 + dots[i].depth * 0.46;
                            dots[i].a = target.edge ? 0.86 + dots[i].depth * 0.1 : 0.48 + dots[i].depth * 0.24;
                            dots[i].delay = wave + Math.random() * 0.16;

            function morphToLine() {

                        const wave = Math.sin(t * Math.PI) * 6;
                        const fade = Math.sin(t * Math.PI);
                        pts.push({ x, y: lineY + wave + (hash01(x, lineY) - 0.5) * 1.4, fade });
                    }
                    const shuffled = shufflePoints([...pts]);
                    const selected = [];
                    for (let i = 0; i < dots.length; i++) selected.push(shuffled[i % shuffled.length]);
                    const setAt = performance.now();
                    for (let i = 0; i < dots.length; i++) {
                        dots[i].tx = selected[i].x;
                        dots[i].ty = selected[i].y;
                        dots[i].color = null;

            let textActive = true;
            function updateDot(p, dt, now, mode) {
                const elapsed = Math.max(0, (now - (p.targetSetAt || now)) / 1000);
                const delayFactor = Math.min(1, Math.max(0, (elapsed - (p.delay || 0)) * 3.2));
                const photoMode = mode.startsWith("photo");
                const spring = photoMode ? 0.016 : 0.018;
                const friction = photoMode ? 0.875 : 0.842;
                const dx = p.tx - p.x;
                const dy = p.ty - p.y;
                p.vx += dx * spring * delayFactor * dt;
                p.vy += dy * spring * delayFactor * dt;
                const drift = p.mode === "text" ? 0.018 : (photoMode ? 0.002 : 0.008);
                p.vx += Math.sin(now * 0.001 + p.seed * 20) * drift * p.depth * dt;
                p.vy += Math.cos(now * 0.0012 + p.seed * 17) * drift * p.depth * dt;
                p.vx *= Math.pow(friction, dt);
                p.vy *= Math.pow(friction, dt);
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.radius += ((p.targetRadius || p.radius) - p.radius) * 0.08 * dt;
            }

            function drawDot(ctx, p, now, mode) {
                const palette = getParticlePalette();
                const speed = Math.min(1, Math.hypot(p.vx, p.vy) / 12);
                const pulse = 0.84 + 0.16 * Math.sin(now * 0.003 + p.twinkle);
                const isPhoto = mode.startsWith("photo");
                const isHeart = p.mode === "heartEdge" || p.mode === "heartFill";
                ctx.globalAlpha = Math.min(1, p.a * pulse + speed * (isPhoto ? 0.08 : 0.18));
                if (isPhoto && typeof p.photoLuma === "number") {
                    const lumaRatio = Math.max(0, Math.min(1, p.photoLuma / 255));
                    const light = palette.photoLightnessMin + lumaRatio * palette.photoLightnessRange;
                    ctx.globalAlpha = Math.min(1, (p.photoAlpha || p.a) * pulse + speed * 0.06);
                    ctx.fillStyle = `hsla(${palette.photoHue}, ${palette.photoSaturation}%, ${light}%, 1)`;
                } else if (p.color) {
                    ctx.fillStyle = p.color;
                } else if (p.mode === "line") {
                    ctx.fillStyle = palette.line.replace(/[\d.]+\)$/, `${Math.min(1, p.a + 0.08)})`);
                } else {
                    const light = p.mode === "lineArt" ? palette.textLightness + 3 : palette.textLightness;
                    const sat = p.mode === "lineArt" ? Math.max(42, palette.textSaturation - 10) : palette.textSaturation;
                    ctx.fillStyle = `hsla(${p.hue}, ${sat}%, ${light}%, 1)`;
                }
                const r = Math.max(0.45, p.radius * (1 + speed * (isPhoto ? 0.22 : 0.45)));
                let drawX = p.x;
                let drawY = p.y;
                if (isHeart && !reduceMotion) {
                    const beat = 1 + Math.pow(Math.max(0, Math.sin(now * 0.0058)), 2.8) * 0.075;
                    drawX = w / 2 + (p.x - w / 2) * beat;
                    drawY = h * 0.48 + (p.y - h * 0.48) * beat;
                }
                ctx.beginPath();
                ctx.arc(drawX, drawY, r, 0, Math.PI * 2);
                ctx.fill();

                if (!isPhoto && speed > 0.16 && !reduceMotion) {
                    ctx.globalAlpha *= 0.24;
                    ctx.beginPath();
                    ctx.arc(p.x - p.vx * 0.82, p.y - p.vy * 0.82, r * 1.85, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

                    for (const p of dots) {
                        updateDot(p, dt, now, mode);
                        drawDot(tCtx, p, now, mode);
                    }
                    tCtx.restore();
                }
                requestAnimationFrame(renderTextFx);

            async function enableBlowDetect() {
                if (micStarted || wishCompleted) return;
                micStarted = true;

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const AC = window.AudioContext || window.webkitAudioContext;
                    const ac = new AC();
                    micStream = stream;
                    micAudioContext = ac;
                    const src = ac.createMediaStreamSource(stream);
                    const analyser = ac.createAnalyser();
                    analyser.fftSize = 1024; src.connect(analyser);
                    const arr = new Uint8Array(analyser.frequencyBinCount);
                    let hold = 0;
                    micBtn.disabled = true;

                        analyser.getByteTimeDomainData(arr);

                        const rms=Math.sqrt(sum/arr.length), level=Math.min(1,rms*7.5);
                        meterFill.style.width=(level*100).toFixed(0)+"%";
                        updateAmbientLights(level);
                        const blowing = level > 0.48;

            function getNextBirthday() {
                const now = new Date();
                const year = now.getFullYear();
                let bd = new Date(year, BIRTH_MONTH, BIRTH_DAY);
                // 只比较年月日，忽略具体时间，否则生日当天 currentTime >= 00:00:00 永远为 true
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                const birthday = getNextBirthday();
                const age = birthday.getFullYear() - BIRTH_YEAR;

                const diff = birthday - now;
                if (diff <= 0) {
                    if (!entered) {
                        document.getElementById('cdTitle').textContent = '农友维生日快乐';
                        cdNumbers.style.display = 'none';
                        document.querySelector('.cd-label').textContent = '今天就是生日';
                        var cdEntry = document.getElementById('cdEntry'); cdEntry.textContent = '🎉 进入'; cdEntry.className = 'msg-btn-index'; cdEntry.style.position = 'static'; cdEntry.style.display = 'inline-block'; var btnContainer2 = document.querySelector('#countdownOverlay > div:nth-child(2)'); if(btnContainer2) { btnContainer2.style.display = 'flex'; btnContainer2.style.justifyContent = 'center'; btnContainer2.style.gap = '12px'; btnContainer2.appendChild(cdEntry); }
                        if (countdownTimer) {
                            clearInterval(countdownTimer);
                            countdownTimer = null;
                        }
                        
                    }
                    return;
                }
                const totalSec = Math.floor(diff / 1000);
                const d = Math.floor(totalSec / 86400);
                const h = Math.floor((totalSec % 86400) / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;
                cdDays.textContent = String(d).padStart(2, '0');
                cdHours.textContent = String(h).padStart(2, '0');
                cdMins.textContent = String(m).padStart(2, '0');
                cdSecs.textContent = String(s).padStart(2, '0');
            }
            updateCountdown();
            countdownTimer = setInterval(updateCountdown, 1000);

            // ---- 实时年龄 ----
            const cdRealAge = document.getElementById('cdRealAge');
            const BIRTH_MS = new Date(BIRTH_YEAR, BIRTH_MONTH, BIRTH_DAY).getTime();
            const MS_PER_YEAR = 365.2425 * 864e5;
            function updateRealAge() {
                const age = (Date.now() - BIRTH_MS) / MS_PER_YEAR;
                const ageStr = age.toFixed(7);
                const el = cdRealAge.querySelector('.age-num');
                if (!el) {
                    cdRealAge.innerHTML = '你现在 <span class="age-num"></span> 岁';
                    const ne = cdRealAge.querySelector('.age-num');
                    buildDigits(ne, ageStr, '');
                    return;
                }
                const oldDigits = [];
                const cells = el.querySelectorAll('.digit-cell');
                cells.forEach(function(cell) {
                    var items = cell.querySelectorAll('.digit-item');
                    if (items.length > 0) oldDigits.push(items[items.length - 1].textContent);
                });
                var oldStr = oldDigits.join('');
                if (oldStr === ageStr) return;
                buildDigits(el, ageStr, oldStr);
            }
            function buildDigits(container, newStr, oldStr) {
                container.innerHTML = '';
                for (var i = 0; i < newStr.length; i++) {
                    var ch = newStr[i];
                    var oldCh = i < oldStr.length ? oldStr[i] : '';
                    var cell = document.createElement('span');
                    cell.className = 'digit-cell';
                    var span = document.createElement('span');
                    span.className = 'digit-item';
                    span.textContent = ch;
                    cell.appendChild(span);
                    container.appendChild(cell);
                    if (oldCh !== '' && oldCh !== ch) {
                        span.style.transform = 'translateY(100%)';
                        span.style.opacity = '0.4';
                        (function(s) {
                            requestAnimationFrame(function() {
                                requestAnimationFrame(function() {
                                    s.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease';
                                    s.style.transform = 'translateY(0)';
                                    s.style.opacity = '1';
                                });
                            });
                        })(span);
                    }
                }
            }
            updateRealAge();
            setInterval(updateRealAge, 100);

            // ---- Crypto helper (XOR + Base64) ----
            function xorDecrypt(b64, key) {
                const str = atob(b64);
                let r = '';
                for (let i = 0; i < str.length; i++) r += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                return r;
            }
            // ---- 测试入口 ----
            const PASSWORD = xorDecrypt('WUtDQ0MG', 'nywsr724');
            const cdEntryBtn = document.getElementById('cdEntry');
            const previewPasswordOverlay = document.getElementById('previewPasswordOverlay');
            const previewPasswordModal = previewPasswordOverlay.querySelector('.preview-modal');
            const previewPasswordInput = document.getElementById('previewPasswordInput');
            const previewPasswordError = document.getElementById('previewPasswordError');
            const previewPasswordSubmit = document.getElementById('previewPasswordSubmit');

            function openPreviewPasswordDialog() {
                previewPasswordInput.value = '';
                previewPasswordError.textContent = '';
                previewPasswordOverlay.hidden = false;
                previewPasswordOverlay.removeAttribute('inert');
                previewPasswordOverlay.setAttribute('aria-hidden', 'false');
                previewPasswordOverlay.classList.add('show');
                requestAnimationFrame(() => previewPasswordInput.focus());
            }

            function closePreviewPasswordDialog() {
                previewPasswordOverlay.classList.remove('show');
                previewPasswordOverlay.setAttribute('aria-hidden', 'true');
                previewPasswordOverlay.setAttribute('inert', '');
                previewPasswordOverlay.hidden = true;
                cdEntryBtn.focus();
            }

            function submitPreviewPassword() {
                if (previewPasswordInput.value === PASSWORD) {
                    closePreviewPasswordDialog();
                    enterCelebration();
                    return;
                }
                previewPasswordError.textContent = '密码错误';
                previewPasswordInput.select();
                previewPasswordInput.focus();
            }

            cdEntryBtn.addEventListener('click', () => {
                if (Date.now() >= getNextBirthday()) {
                    enterCelebration();
                    return;
                }
                openPreviewPasswordDialog();
            });
            previewPasswordSubmit.addEventListener('click', submitPreviewPassword);
            document.getElementById('previewPasswordClose').addEventListener('click', closePreviewPasswordDialog);
            document.getElementById('previewPasswordCancel').addEventListener('click', closePreviewPasswordDialog);
            previewPasswordOverlay.addEventListener('click', (e) => {
                if (e.target === previewPasswordOverlay) closePreviewPasswordDialog();
            });
            previewPasswordModal.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitPreviewPassword();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    closePreviewPasswordDialog();
                }
            });
            // ---- 留言板（GitHub Issues API） ----
            const GITHUB_TOKEN = xorDecrypt('CREHLDp+VUEaPUQcNAN7YyMAOSAneH1TPyBHMkZxAXgZDERCMHlgWw==', 'nywsr724');
            const ISSUES_API = 'https://api.github.com/repos/raoroger380/nywsr724/issues';

            async function fetchMessages() {
                try {
                    const res = await fetch(`${ISSUES_API}?labels=message&state=open&per_page=50&sort=created&direction=desc`);
                    if (!res.ok) throw new Error('Fetch failed');
                    const issues = await res.json();
                    return issues.map(issue => {
                        const nameMatch = issue.body ? issue.body.match(/^name:(.*)$/m) : null;
                        return {
                            title: issue.title,
                            name: nameMatch ? nameMatch[1].trim() : '',
                            time: issue.created_at,
                        };
                    });
                } catch (e) {
                    return [];
                }
            }

            function displayMessages(messages) {
                const container = document.getElementById('msgItems');
                if (messages.length === 0) {
                    container.innerHTML = '<div class="msg-empty">还没有祝福，快来留言吧 💬</div>';
                    return;
                }
                container.innerHTML = messages.map(msg => {
                    const nameHtml = msg.name ? `<div class="msg-item-name">${escapeHtml(msg.name)}</div>` : '';
                    const timeStr = msg.time ? new Date(msg.time).toLocaleDateString('zh-CN') : '';
                    return `
                        <div class="msg-item">
                            ${nameHtml}
                            <div class="msg-item-text">${escapeHtml(msg.title)}</div>
                            <div class="msg-item-time">${timeStr}</div>
                        </div>
                    `;
                }).join('');
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            async function submitMessage(name, content) {
                const title = name ? `${content} — ${name}` : content;
                try {
                    const res = await fetch(ISSUES_API, {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ title, body: name ? `name:${name}` : 'name:匿名', labels: ['message'] }),
                    });
                    if (!res.ok) throw new Error('Submit failed');
                    showMsgToast('祝福已发送 ✨ 将出现在首页弹幕中');
                    return true;
                } catch (e) {
                    showMsgToast('发送失败，请稍后再试');
                    return false;
                }
            }

            function showMsgToast(text) {
                const existing = document.querySelector('.msg-toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'msg-toast';
                toast.textContent = text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2200);
            }

            let lastMessageTrigger = null;
            function openMessageWall() {
                lastMessageTrigger = document.activeElement;
                const overlay = document.getElementById('messageOverlay');
                const modal = overlay.querySelector('.msg-modal');
                overlay.classList.add('show');
                requestAnimationFrame(() => (document.getElementById('msgContent') || modal).focus());
                loadAndDisplayMessages();
            }
            function closeMessageWall() {
                document.getElementById('messageOverlay').classList.remove('show');
                if (lastMessageTrigger && typeof lastMessageTrigger.focus === 'function') {
                    lastMessageTrigger.focus();
                }
            }

            async function loadAndDisplayMessages() {
                const msgs = await fetchMessages();
                displayMessages(msgs);
            }

            document.getElementById('msgBtn').addEventListener('click', openMessageWall);
            document.getElementById('msgClose').addEventListener('click', closeMessageWall);
            document.getElementById('messageOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeMessageWall();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('messageOverlay').classList.contains('show')) {
                    closeMessageWall();
                }
            });
            document.getElementById('msgSubmit').addEventListener('click', async () => {
                const nameInput = document.getElementById('msgName');
                const contentInput = document.getElementById('msgContent');
                const name = nameInput.value.trim();
                const content = contentInput.value.trim();
                if (!content) {
                    showMsgToast('请输入祝福内容');
                    return;
                }
                const btn = document.getElementById('msgSubmit');
                btn.disabled = true;
                btn.textContent = '发送中...';
                const ok = await submitMessage(name, content);
                btn.disabled = false;
                btn.textContent = '发送祝福 ✨';
                if (ok) {
                    contentInput.value = '';
                    nameInput.value = '';
                    await loadAndDisplayMessages();
                }
            });
            // ---- 管理后台入口（隐藏） ----
            document.getElementById('adminEntry').addEventListener('click', () => {
                window.location.href = 'admin.html';
            });

            let starContainer = null;
            function createThemeStars() {
                if (starContainer) return;
                const palette = getParticlePalette();
                starContainer = document.createElement('div');
                starContainer.id = 'starContainer';
                starContainer.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
                document.body.insertBefore(starContainer, document.body.firstChild);
                const fragment = document.createDocumentFragment();
                const count = reduceMotion ? 32 : 120;
                for (let i = 0; i < count; i++) {
                    const star = document.createElement('div');
                    const size = Math.random() * 2.5 + 1;
                    star.style.cssText =
                        'position:absolute;width:' + size + 'px;height:' + size + 'px;background:' + palette.star + ';border-radius:50%;left:' +
                        Math.random() * 100 + '%;top:' + Math.random() * 100 + '%;opacity:' +
                        (Math.random() * 0.6 + 0.2) + ';animation:starBlink ' +
                        (Math.random() * 3 + 2) + 's ease-in-out ' + (Math.random() * 3) + 's infinite alternate;';
                    fragment.appendChild(star);
                }
                starContainer.appendChild(fragment);
            }
            function removeThemeStars() {
                if (starContainer) {
                    starContainer.remove();
                    starContainer = null;
                }
            }
            function applyTheme(isDark) {
                document.documentElement.classList.toggle('dark', isDark);
                document.body.classList.toggle('dark', isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                document.getElementById('themeLabel').textContent = isDark ? '深色' : '浅色';
                document.getElementById('themeToggle').setAttribute('aria-pressed', String(isDark));
                syncParticleColors();
                bgCtx.clearRect(0, 0, w, h);
                tCtx.clearRect(0, 0, w, h);
                if (isDark && !reduceMotion) createThemeStars();
                else removeThemeStars();
            }
            applyTheme(localStorage.getItem('theme') === 'dark');
            document.getElementById('themeToggle').addEventListener('click', () => {
                applyTheme(!document.body.classList.contains('dark'));
            });

        })();
    </script>
</body>
